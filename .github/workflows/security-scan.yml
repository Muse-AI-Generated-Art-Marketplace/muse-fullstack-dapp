name: Automated Security Scanning

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Mondays at midnight

jobs:
  # Job 1: Dependency Review (PRs only) - prevents vulnerable deps from being added
  dependency-review:
    name: Dependency Review (PRs)
    runs-on: ubuntu-latest
    # Only run on pull requests (not pushes)
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-scoring: 7  # High severity
          comment-summary: true
          fail-on-hide-package-url: false

  # Job 2: Dependency Vulnerability Audit (npm audit) - all branches
  audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (all workspaces)
        run: npm ci

      - name: Run npm audit (all workspaces)
        run: npm audit --audit-level=high --json > npm-audit-report.json || echo 'VULNERABILITIES_FOUND=true' >> $GITHUB_ENV

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

      - name: Fail if high/critical vulnerabilities found
        if: env.VULNERABILITIES_FOUND == 'true'
        run: |
          echo "❌ High or critical vulnerabilities found. See npm-audit-report artifact."
          echo "Run 'npm audit' locally and update dependencies."
          exit 1

  # Job 3: CodeQL Security Analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
          config-file: ./.codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # Job 4: Security Linting (Backend)
  security-lint-backend:
    name: Backend Security Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend security lint
        working-directory: ./apps/backend
        run: |
          npx eslint src --ext .ts \
            --plugin security \
            --plugin node-security \
            --rule 'security/detect-object-injection: error' \
            --rule 'security/detect-possible-timing-attacks: error' \
            --rule 'node-security/detect-eval-with-expression: error' \
            --rule 'node-security/detect-non-literal-fs-filename: error' \
            --rule 'node-security/detect-non-literal-require: error' \
            --rule 'node-security/detect-unsafe-regex: error' \
            --max-warnings 0

  # Job 5: Security Linting (Frontend)
  security-lint-frontend:
    name: Frontend Security Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend security lint via workspace script
        run: npm run lint:security --workspace=muse-frontend

  # Job 6: Security Linting (Web)
  security-lint-web:
    name: Web Security Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run web security lint
        run: npx eslint -c .eslintrc.security.js apps/web/src --ext ts,tsx --max-warnings 0

  # Job 7: Secret Scanning
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .gitleaks.toml
          log-level: info
          fail: true

  # Job 8: Security Headers Validation (via Jest)
  security-headers:
    name: Security Headers Test
    runs-on: ubuntu-latest
    needs: [ audit ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run security headers tests
        working-directory: ./apps/backend
        run: npm test -- src/tests/securityHeaders.test.ts --coverage=false

  # Job 9: Security Summary
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [ audit, codeql, security-lint-backend, security-lint-frontend, security-lint-web, secret-scanning, security-headers ]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status | Notes |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ✅ Completed | Checks for known vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ✅ Completed | Static application security testing" >> $GITHUB_STEP_SUMMARY
          echo "| Backend ESLint (Security) | ✅ Completed | Node.js security rules" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend ESLint (Security) | ✅ Completed | React/Vite security rules" >> $GITHUB_STEP_SUMMARY
          echo "| Web ESLint (Security) | ✅ Completed | Additional frontend security rules" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks Secret Scan | ✅ Completed | No hardcoded secrets" >> $GITHUB_STEP_SUMMARY
          echo "| Security Headers Tests | ✅ Completed | Helmet, CSP, HSTS verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Detailed artifacts uploaded** (retained 30 days)" >> $GITHUB_STEP_SUMMARY
          echo "🔍 **CodeQL alerts** appear in repository Security tab" >> $GITHUB_STEP_SUMMARY
